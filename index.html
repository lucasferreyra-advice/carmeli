<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARMELI — Consultor de Precios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;800;900&family=Montserrat:wght@400;500;600;700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amber:  #E8A020;
      --amber2: #c98010;
      --green:  #16a34a;
      --red:    #dc2626;
      --blue:   #2563eb;
      --r:      12px;
      --sh:     0 2px 12px rgba(0,0,0,0.07);
      --sh2:    0 8px 32px rgba(0,0,0,0.11);
    }
    [data-theme="light"] {
      --bg:      #f2f4f8;
      --bg2:     #e8eaf0;
      --sur:     #ffffff;
      --sur2:    #f8f9fc;
      --bdr:     #dde0e8;
      --bdr2:    #c8ccda;
      --tx:      #0f1117;
      --tx2:     #3d4260;
      --mt:      #8890aa;
    }
    [data-theme="dark"] {
      --bg:      #0d0f14;
      --bg2:     #12151c;
      --sur:     #171b26;
      --sur2:    #1d2133;
      --bdr:     #242838;
      --bdr2:    #2c3048;
      --tx:      #eceef6;
      --tx2:     #9aa0bc;
      --mt:      #555d78;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ══════════ LOGIN ══════════ */
    #login-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      transition: background .3s;
    }

    .login-wrap { width:100%; max-width:420px; padding:24px; }

    .login-logo { text-align:center; margin-bottom:36px; }
    .login-logo h1 {
      font-family:'Raleway',sans-serif; font-weight:900;
      font-size:58px; letter-spacing:10px; color:var(--amber);
      text-shadow: 0 2px 20px rgba(232,160,32,.2);
    }
    .login-logo p {
      font-family:'Roboto Mono',monospace; font-size:10px;
      letter-spacing:3px; color:var(--mt); text-transform:uppercase; margin-top:8px;
    }

    .login-card {
      background:var(--sur); border:1px solid var(--bdr);
      border-radius:16px; padding:36px; box-shadow:var(--sh2);
    }
    .login-card h2 {
      font-family:'Raleway',sans-serif; font-weight:800;
      font-size:20px; margin-bottom:28px;
    }

    .field { margin-bottom:18px; }
    .field label {
      display:block; font-family:'Roboto Mono',monospace;
      font-size:10px; letter-spacing:2px; text-transform:uppercase;
      color:var(--mt); margin-bottom:8px;
    }
    .field input {
      width:100%; background:var(--bg); border:1.5px solid var(--bdr);
      border-radius:8px; padding:12px 14px;
      font-family:'Montserrat',sans-serif; font-size:14px; color:var(--tx);
      outline:none; transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color:var(--amber);
      box-shadow:0 0 0 3px rgba(232,160,32,.12);
    }

    .btn-primary {
      width:100%; background:var(--amber); color:#fff;
      border:none; border-radius:8px; padding:13px;
      font-family:'Raleway',sans-serif; font-weight:800;
      font-size:15px; letter-spacing:2px;
      cursor:pointer; transition:all .2s; margin-top:6px;
    }
    .btn-primary:hover { background:var(--amber2); box-shadow:0 6px 20px rgba(232,160,32,.3); }
    .btn-primary:active { transform:scale(.99); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }

    .login-err {
      background:rgba(220,38,38,.07); border:1px solid rgba(220,38,38,.25);
      border-radius:8px; padding:10px 14px;
      font-family:'Roboto Mono',monospace; font-size:12px;
      color:var(--red); margin-top:14px; display:none;
    }

    /* ══════════ HEADER ══════════ */
    #app { display:none; }

    .header {
      position:sticky; top:0; z-index:50;
      background:var(--sur); border-bottom:1px solid var(--bdr);
      padding:0 32px; height:58px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 1px 8px rgba(0,0,0,.06);
      transition:background .3s;
    }
    .header-brand {
      font-family:'Raleway',sans-serif; font-weight:900;
      font-size:24px; letter-spacing:5px; color:var(--amber);
    }
    .header-right { display:flex; align-items:center; gap:12px; }

    .user-badge {
      font-family:'Roboto Mono',monospace; font-size:11px;
      color:var(--tx2); background:var(--bg2);
      border:1px solid var(--bdr); padding:5px 12px; border-radius:20px;
    }

    /* THEME SWITCH */
    .theme-toggle { display:flex; align-items:center; gap:6px; }
    .theme-icon { font-size:15px; user-select:none; }

    .sw { position:relative; width:40px; height:21px; }
    .sw input { opacity:0; width:0; height:0; }
    .sw-track {
      position:absolute; inset:0;
      background:var(--bdr2); border-radius:21px;
      cursor:pointer; transition:background .3s;
    }
    .sw-track::before {
      content:''; position:absolute;
      width:15px; height:15px; left:3px; top:3px;
      background:#fff; border-radius:50%;
      transition:transform .3s;
      box-shadow:0 1px 4px rgba(0,0,0,.2);
    }
    .sw input:checked + .sw-track { background:var(--amber); }
    .sw input:checked + .sw-track::before { transform:translateX(19px); }

    .btn-logout {
      font-family:'Roboto Mono',monospace; font-size:11px;
      color:var(--mt); background:none;
      border:1px solid var(--bdr); padding:5px 12px;
      border-radius:6px; cursor:pointer; transition:all .2s;
    }
    .btn-logout:hover { color:var(--red); border-color:var(--red); }

    /* ══════════ MAIN ══════════ */
    .main { max-width:1100px; margin:0 auto; padding:36px 24px; }

    /* SEARCH PANEL */
    .panel {
      background:var(--sur); border:1px solid var(--bdr);
      border-radius:var(--r); padding:30px;
      margin-bottom:24px; box-shadow:var(--sh);
      position:relative; overflow:hidden;
      transition:background .3s;
    }
    .panel::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--amber),transparent 70%);
    }

    .panel-label {
      font-family:'Roboto Mono',monospace; font-size:10px;
      letter-spacing:3px; color:var(--amber);
      text-transform:uppercase; margin-bottom:22px;
    }

    .form-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
      gap:14px; margin-bottom:22px;
    }
    .ff { display:flex; flex-direction:column; gap:7px; }
    .ff label {
      font-family:'Roboto Mono',monospace; font-size:10px;
      letter-spacing:2px; color:var(--mt); text-transform:uppercase;
    }
    .ff input {
      background:var(--bg); border:1.5px solid var(--bdr);
      border-radius:8px; padding:10px 13px;
      font-family:'Montserrat',sans-serif; font-size:13px; font-weight:500;
      color:var(--tx); outline:none; transition:border-color .2s, box-shadow .2s;
    }
    .ff input:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(232,160,32,.1); }
    .ff input::placeholder { color:var(--bdr2); }

    .btn-buscar {
      background:var(--amber); color:#fff;
      border:none; border-radius:10px; padding:12px 28px;
      font-family:'Raleway',sans-serif; font-weight:800;
      font-size:15px; letter-spacing:2px;
      cursor:pointer; transition:all .2s;
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn-buscar:hover {
      background:var(--amber2); transform:translateY(-1px);
      box-shadow:0 8px 24px rgba(232,160,32,.28);
    }
    .btn-buscar:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

    /* STATS */
    .stats-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:14px; margin-bottom:24px;
      animation:fadeUp .4s ease;
    }
    .stat-card {
      background:var(--sur); border:1px solid var(--bdr);
      border-radius:var(--r); padding:20px; box-shadow:var(--sh);
      transition:background .3s;
    }
    .stat-card.primary { background:var(--amber); border-color:var(--amber2); }
    .stat-lbl {
      font-family:'Roboto Mono',monospace; font-size:10px;
      letter-spacing:2px; color:var(--mt);
      text-transform:uppercase; margin-bottom:10px;
    }
    .stat-card.primary .stat-lbl { color:rgba(255,255,255,.75); }
    .stat-val {
      font-family:'Raleway',sans-serif; font-weight:800;
      font-size:22px; color:var(--tx); line-height:1;
    }
    .stat-card.primary .stat-val { color:#fff; }
    .stat-sub {
      font-family:'Roboto Mono',monospace; font-size:10px;
      color:var(--mt); margin-top:6px;
    }
    .stat-card.primary .stat-sub { color:rgba(255,255,255,.65); }

    /* AI ADVICE PANEL */
    .ai-panel {
      background:var(--sur); border:1px solid var(--bdr);
      border-radius:var(--r); padding:28px;
      margin-bottom:24px; box-shadow:var(--sh);
      position:relative; overflow:hidden;
      animation:fadeUp .5s ease;
      transition:background .3s;
    }
    .ai-panel::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,#7c3aed,#2563eb,transparent 80%);
    }

    .ai-header {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
    }
    .ai-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:linear-gradient(135deg,#7c3aed,#2563eb);
      color:#fff; border-radius:20px;
      padding:4px 12px;
      font-family:'Roboto Mono',monospace; font-size:10px;
      letter-spacing:2px; text-transform:uppercase;
    }
    .ai-dot {
      width:6px; height:6px; background:#fff;
      border-radius:50%; animation:pulse 1.5s infinite;
    }
    .ai-title {
      font-family:'Raleway',sans-serif; font-weight:800;
      font-size:15px; color:var(--tx);
    }

    .ai-content {
      font-family:'Montserrat',sans-serif; font-size:13.5px;
      line-height:1.75; color:var(--tx2);
      white-space:pre-wrap;
    }

    .ai-content strong {
      font-weight:700; color:var(--tx);
      display:block; margin-top:16px; margin-bottom:4px;
      font-size:13px;
    }

    .ai-loading {
      display:flex; align-items:center; gap:12px;
      padding:8px 0;
    }
    .ai-ring {
      width:22px; height:22px; flex-shrink:0;
      border:2px solid var(--bdr2); border-top-color:#7c3aed;
      border-radius:50%; animation:spin .7s linear infinite;
    }
    .ai-loading-txt {
      font-family:'Roboto Mono',monospace; font-size:11px;
      letter-spacing:2px; color:var(--mt); text-transform:uppercase;
    }

    /* RESULTS */
    .results-hdr {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:14px;
    }
    .results-title {
      font-family:'Roboto Mono',monospace; font-size:11px;
      letter-spacing:2px; color:var(--mt); text-transform:uppercase;
    }
    .results-count {
      font-family:'Roboto Mono',monospace; font-size:11px;
      color:var(--amber); background:rgba(232,160,32,.1);
      padding:3px 10px; border-radius:20px;
      border:1px solid rgba(232,160,32,.2);
    }

    .vehicle-list {
      display:flex; flex-direction:column; gap:8px;
      animation:fadeUp .5s ease;
    }
    .vc {
      background:var(--sur); border:1px solid var(--bdr);
      border-radius:10px; padding:14px 18px;
      display:grid; grid-template-columns:62px 1fr auto;
      gap:14px; align-items:center;
      text-decoration:none; color:inherit;
      transition:all .2s;
    }
    .vc:hover { border-color:var(--amber); box-shadow:var(--sh); transform:translateX(2px); }

    .vc-img {
      width:62px; height:46px; object-fit:cover;
      border-radius:6px; background:var(--bg2);
    }
    .vc-ph {
      width:62px; height:46px; background:var(--bg2);
      border-radius:6px; display:flex; align-items:center;
      justify-content:center; font-size:22px;
    }
    .vc-info h3 {
      font-family:'Montserrat',sans-serif; font-size:13px;
      font-weight:600; color:var(--tx); margin-bottom:5px; line-height:1.3;
    }
    .vc-meta { display:flex; gap:10px; flex-wrap:wrap; }
    .meta-t {
      font-family:'Roboto Mono',monospace; font-size:10px; color:var(--mt);
    }
    .vc-price .price {
      font-family:'Raleway',sans-serif; font-weight:800;
      font-size:20px; color:var(--tx); white-space:nowrap;
    }
    .vc-price .cta {
      font-family:'Roboto Mono',monospace; font-size:10px;
      color:var(--amber); text-align:right; margin-top:3px;
    }

    /* LOADER */
    .loader {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:64px; gap:14px;
    }
    .loader-ring {
      width:36px; height:36px;
      border:2px solid var(--bdr2); border-top-color:var(--amber);
      border-radius:50%; animation:spin .7s linear infinite;
    }
    .loader-txt {
      font-family:'Roboto Mono',monospace; font-size:11px;
      letter-spacing:2px; color:var(--mt); text-transform:uppercase;
    }

    /* EMPTY / ERROR */
    .empty {
      background:var(--sur); border:1px solid var(--bdr);
      border-radius:var(--r); text-align:center; padding:60px 24px;
    }
    .empty .icon { font-size:48px; margin-bottom:16px; }
    .empty h3 {
      font-family:'Raleway',sans-serif; font-weight:700;
      font-size:18px; margin-bottom:8px;
    }
    .empty p {
      font-family:'Roboto Mono',monospace; font-size:12px; color:var(--mt);
    }
    .err-box {
      background:rgba(220,38,38,.07); border:1px solid rgba(220,38,38,.2);
      border-radius:10px; padding:16px 20px;
      font-family:'Roboto Mono',monospace; font-size:12px; color:var(--red);
    }

    /* ANIMATIONS */
    @keyframes spin  { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width:640px) {
      .stats-grid { grid-template-columns:repeat(2,1fr); }
      .form-grid  { grid-template-columns:1fr 1fr; }
      .vc { grid-template-columns:1fr auto; }
      .vc-img,.vc-ph { display:none; }
      .header { padding:0 16px; }
      .main { padding:24px 16px; }
    }
  </style>
</head>
<body>

<!-- ══════ LOGIN ══════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <h1>CARMELI</h1>
      <p>Consultor de precios · Argentina</p>
    </div>
    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="lu" placeholder="usuario" autocomplete="username" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" onclick="doLogin()">INGRESAR</button>
      <div class="login-err" id="lerr">Usuario o contraseña incorrectos</div>
    </div>
  </div>
</div>

<!-- ══════ APP ══════ -->
<div id="app">

  <header class="header">
    <div class="header-brand">CARMELI</div>
    <div class="header-right">
      <div class="user-badge" id="ubadge">—</div>
      <div class="theme-toggle">
        <span class="theme-icon">☀️</span>
        <label class="sw">
          <input type="checkbox" id="theme-chk" onchange="toggleTheme(this)" />
          <span class="sw-track"></span>
        </label>
        <span class="theme-icon">🌙</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">SALIR</button>
    </div>
  </header>

  <main class="main">

    <!-- Búsqueda -->
    <div class="panel">
      <div class="panel-label">// Consulta de precio</div>
      <div class="form-grid">
        <div class="ff"><label>Marca</label><input id="fm" placeholder="Fiat" /></div>
        <div class="ff"><label>Modelo</label><input id="fmo" placeholder="Toro" /></div>
        <div class="ff"><label>Versión</label><input id="fv" placeholder="Freedom 4x4" /></div>
        <div class="ff"><label>Año</label><input type="number" id="fa" placeholder="2019" min="1990" max="2026" /></div>
        <div class="ff"><label>Kilómetros</label><input type="number" id="fk" placeholder="80000" /></div>
      </div>
      <button class="btn-buscar" id="btn-buscar" onclick="buscar()">
        🔍 BUSCAR EN MERCADOLIBRE
      </button>
    </div>

    <!-- Stats -->
    <div id="stats-sec" style="display:none"></div>

    <!-- AI Advice -->
    <div id="ai-sec" style="display:none"></div>

    <!-- Resultados -->
    <div id="results-sec"></div>

  </main>
</div>

<script>
/* ── USUARIOS ── */
const USUARIOS = [
  { u:'admin',     p:'carmeli2025', nombre:'Administrador' },
  { u:'vendedor1', p:'auto2025',    nombre:'Vendedor 1'    },
  { u:'vendedor2', p:'auto2025',    nombre:'Vendedor 2'    },
];

/* ── AUTH ── */
function doLogin() {
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value;
  const user = USUARIOS.find(x => x.u === u && x.p === p);
  if (!user) { document.getElementById('lerr').style.display = 'block'; return; }
  sessionStorage.setItem('cm_user', JSON.stringify(user));
  showApp(user);
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('ubadge').textContent = user.nombre;
}

function doLogout() {
  sessionStorage.removeItem('cm_user');
  location.reload();
}

const saved = sessionStorage.getItem('cm_user');
if (saved) showApp(JSON.parse(saved));

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

/* ── THEME ── */
function toggleTheme(chk) {
  document.documentElement.setAttribute('data-theme', chk.checked ? 'dark' : 'light');
  localStorage.setItem('cm_theme', chk.checked ? 'dark' : 'light');
}
const savedTheme = localStorage.getItem('cm_theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('theme-chk') && (document.getElementById('theme-chk').checked = true);
}

/* ── BÚSQUEDA — llama directo a ML desde el browser (sin proxy) ── */
async function buscar() {
  const marca   = document.getElementById('fm').value.trim();
  const modelo  = document.getElementById('fmo').value.trim();
  const version = document.getElementById('fv').value.trim();
  const anio    = document.getElementById('fa').value.trim();
  const km      = document.getElementById('fk').value.trim();

  if (!marca || !modelo) { alert('Ingresá al menos Marca y Modelo'); return; }

  const btn = document.getElementById('btn-buscar');
  btn.disabled = true;

  document.getElementById('stats-sec').style.display = 'none';
  document.getElementById('ai-sec').style.display = 'none';
  document.getElementById('results-sec').innerHTML = `
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-txt">Consultando MercadoLibre...</div>
    </div>`;

  try {
    // Llamada directa al browser — ML permite CORS desde navegadores
    let query = `${marca} ${modelo}`;
    if (version) query += ` ${version}`;
    if (anio)    query += ` ${anio}`;

    const params = new URLSearchParams({ marca, modelo, version, anio });
    const res = await fetch(`/api/buscar?${params}`);
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`HTTP ${res.status}: ${txt.slice(0,200)}`);
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error + (data.detalle ? ` — ${data.detalle}` : ''));

    renderResultados(data, marca, modelo, km);
    if (data.vehiculos?.length > 0) {
      pedirConsejo(data, marca, modelo, version, anio, km);
    }

  } catch (err) {
    document.getElementById('results-sec').innerHTML =
      `<div class="err-box">⚠️ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

/* ── RENDER STATS + LISTA ── */
function fmt(n) { return '$ ' + n.toLocaleString('es-AR'); }

function renderResultados(data, marca, modelo, km) {
  // Defensive: si la respuesta no tiene la estructura esperada
  if (!data || data.error || data.problema || data.diagnostico) {
    const msg = data?.error || data?.problema || data?.diagnostico || 'Respuesta inesperada de la API';
    const detalle = data?.detalle || data?.token_recibido || '';
    document.getElementById('results-sec').innerHTML =
      `<div class="err-box">⚠️ ${msg}${detalle ? `<br/><small style="opacity:.7">${detalle}</small>` : ''}</div>`;
    return;
  }

  const { estadisticas: s, vehiculos = [], total = 0, muestra = 0 } = data;

  if (muestra > 0) {
    document.getElementById('stats-sec').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card primary">
          <div class="stat-lbl">Precio promedio</div>
          <div class="stat-val">${fmt(s.promedio)}</div>
          <div class="stat-sub">${muestra} publicaciones</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Mediana</div>
          <div class="stat-val">${fmt(s.mediana)}</div>
          <div class="stat-sub">Precio central</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Mínimo</div>
          <div class="stat-val">${fmt(s.minimo)}</div>
          <div class="stat-sub">Más económico</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Máximo</div>
          <div class="stat-val">${fmt(s.maximo)}</div>
          <div class="stat-sub">Más caro</div>
        </div>
      </div>`;
    document.getElementById('stats-sec').style.display = 'block';
  }

  if (!vehiculos.length) {
    document.getElementById('results-sec').innerHTML = `
      <div class="empty">
        <div class="icon">🔎</div>
        <h3>Sin resultados</h3>
        <p>No encontramos publicaciones para "${marca} ${modelo}".<br/>Probá con términos más generales.</p>
      </div>`;
    return;
  }

  const items = vehiculos.map(v => `
    <a class="vc" href="${v.link}" target="_blank" rel="noopener">
      ${v.imagen
        ? `<img class="vc-img" src="${v.imagen}" alt="${v.titulo}" loading="lazy" />`
        : `<div class="vc-ph">🚗</div>`}
      <div class="vc-info">
        <h3>${v.titulo}</h3>
        <div class="vc-meta">
          ${v.anio      ? `<span class="meta-t">📅 ${v.anio}</span>` : ''}
          ${v.km        ? `<span class="meta-t">🛣️ ${Number(v.km).toLocaleString('es-AR')} km</span>` : ''}
          ${v.ubicacion ? `<span class="meta-t">📍 ${v.ubicacion}</span>` : ''}
          <span class="meta-t">${v.condicion}</span>
        </div>
      </div>
      <div class="vc-price">
        <div class="price">${fmt(v.precio)}</div>
        <div class="cta">Ver en ML →</div>
      </div>
    </a>`).join('');

  document.getElementById('results-sec').innerHTML = `
    <div class="results-hdr">
      <div class="results-title">// Publicaciones encontradas</div>
      <div class="results-count">${total.toLocaleString('es-AR')} totales en ML</div>
    </div>
    <div class="vehicle-list">${items}</div>`;
}

/* ── AI CONSEJO ── */
async function pedirConsejo(data, marca, modelo, version, anio, km) {
  const aiSec = document.getElementById('ai-sec');
  aiSec.innerHTML = `
    <div class="ai-panel">
      <div class="ai-header">
        <div class="ai-badge"><div class="ai-dot"></div> IA</div>
        <div class="ai-title">Análisis inteligente de mercado</div>
      </div>
      <div class="ai-loading">
        <div class="ai-ring"></div>
        <div class="ai-loading-txt">Analizando precios con IA...</div>
      </div>
    </div>`;
  aiSec.style.display = 'block';

  try {
    const busqueda = [marca, modelo, version, anio].filter(Boolean).join(' ');
    const res = await fetch('/api/consejo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        busqueda,
        estadisticas: data.estadisticas,
        vehiculos: data.vehiculos,
        km,
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { consejo } = await res.json();

    // Formatear secciones con emojis en negrita
    const formatted = consejo
      .replace(/(💰[^\n]+)/g, '<strong>$1</strong>')
      .replace(/(🎯[^\n]+)/g, '<strong>$1</strong>')
      .replace(/(✅[^\n]+)/g, '<strong>$1</strong>')
      .replace(/(⚠️[^\n]+)/g, '<strong>$1</strong>');

    aiSec.innerHTML = `
      <div class="ai-panel">
        <div class="ai-header">
          <div class="ai-badge"><div class="ai-dot"></div> IA</div>
          <div class="ai-title">Análisis inteligente de mercado</div>
        </div>
        <div class="ai-content">${formatted}</div>
      </div>`;
  } catch (err) {
    aiSec.innerHTML = `
      <div class="ai-panel">
        <div class="ai-header">
          <div class="ai-badge">IA</div>
          <div class="ai-title">Análisis no disponible</div>
        </div>
        <div class="err-box">No se pudo generar el análisis IA. Verificá que ANTHROPIC_API_KEY esté configurada en Vercel.</div>
      </div>`;
  }
}
