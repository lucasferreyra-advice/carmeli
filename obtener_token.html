<!DOCTYPE html>
<html>
<head>
  <title>Obtener Token de Mercado Libre</title>
</head>
<body>

  <h1>Obteniendo tu Access Token...</h1>
  <p>Reemplaza tus datos en el código y abre este archivo en tu navegador.</p>
  <p>La respuesta aparecerá en esta misma página y en la consola (F12).</p>

  <div id="resultado" style="font-family: monospace; background-color: #f0f0f0; padding: 15px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word;"></div>

  <script>
    // --- 1. REEMPLAZA TUS DATOS AQUÍ ---
    const clientId = "8173643510171633"; // Ya está tu App ID
    const clientSecret = "ql3Ay3uuQukCCJbCR2BemwO6dnTGILWL"; // <-- ¡REEMPLAZA ESTO!
    const authCode = "TG-69af07ff339f3f00012bcad9-90946991"; // Ya está tu código TG
    const redirectUri = "https://carmeli-fchc.vercel.app/";
    // ------------------------------------

    const url = 'https://api.mercadolibre.com/oauth/token';
    const formBody = `grant_type=authorization_code&client_id=${clientId}&client_secret=${clientSecret}&code=${authCode}&redirect_uri=${redirectUri}`;

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formBody
    } )
    .then(response => response.json())
    .then(data => {
      console.log(data);
      document.getElementById('resultado').textContent = JSON.stringify(data, null, 2);
    })
    .catch(error => {
      console.error(error);
      document.getElementById('resultado').textContent = 'Error: ' + error.message;
    });
  </script>

</body>
</html>
